apiVersion: 1
policies:
    - orgId: 1
      receiver: grafana-default-email
      group_by:
        - grafana_folder
        - alertname
      routes:
        - receiver: composer-monitor-trial-slack
          object_matchers:
            - - AlertType
              - =
              - metrics
          group_wait: 10s
          group_interval: 10s
          repeat_interval: 1h
